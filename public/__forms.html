<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Form Definitions</title>
  </head>
  <body>
    <form name="private-consultation-lead" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="private-consultation-lead" />
      <input type="text" name="bot-field" />
      <input type="text" name="full_name" />
      <input type="text" name="nationality" />
      <input type="text" name="residence_country" />
      <input type="text" name="budget_range" />
      <input type="text" name="timeline" />
      <input type="text" name="phone_whatsapp" />
      <input type="email" name="email" />
      <textarea name="notes"></textarea>
      <input type="text" name="source_page" />
      <input type="text" name="source_category" />
      <input type="text" name="language" />
    </form>

    <form name="investor-qualification" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="investor-qualification" />
      <input type="text" name="bot-field" />
      <input type="text" name="full_name" />
      <input type="email" name="email" />
      <input type="text" name="phone_whatsapp" />
      <input type="text" name="nationality" />
      <input type="text" name="residence_country" />
      <input type="text" name="preferred_destination" />
      <input type="text" name="budget_range" />
      <input type="text" name="timeline" />
      <input type="text" name="applicant_type" />
      <input type="text" name="program_type" />
      <textarea name="notes"></textarea>
      <input type="text" name="source_page" />
      <input type="text" name="consent" />
    </form>

    <form name="company-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="company-inquiry" />
      <input type="text" name="bot-field" />
      <input type="text" name="company_name" />
      <input type="text" name="contact_person" />
      <input type="email" name="work_email" />
      <input type="text" name="phone_whatsapp" />
      <input type="text" name="region_served" />
      <input type="text" name="team_size" />
      <input type="text" name="interest_type" />
      <input type="text" name="timeline" />
      <textarea name="message"></textarea>
      <input type="text" name="source_page" />
      <input type="text" name="consent" />
    </form>

    <form name="partner-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="partner-inquiry" />
      <input type="text" name="bot-field" />
      <input type="text" name="company_name" />
      <input type="text" name="contact_person" />
      <input type="email" name="work_email" />
      <input type="text" name="phone_whatsapp" />
      <input type="text" name="region_served" />
      <input type="text" name="team_size" />
      <input type="text" name="interest_type" />
      <input type="text" name="timeline" />
      <textarea name="message"></textarea>
      <input type="text" name="source_page" />
      <input type="text" name="consent" />
    </form>
  </body>
</html>
